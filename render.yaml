services:
  - type: web
    name: qbridge-os
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: HOST=0.0.0.0 python run_api.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: QBRIDGE_SKIP_PQC_VERIFY
        value: "1"
      - key: QBRIDGE_AUTH_DEV_LOG_OTP
        value: "0"
      - key: QBRIDGE_FORCE_MEMORY_DB
        value: "1"
      - key: QBRIDGE_JWT_SECRET
        generateValue: true
