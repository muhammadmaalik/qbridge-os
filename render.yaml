databases:
  - name: qbridge-db
    databaseName: qaas_db
    user: qbridge
    plan: free

services:
  - type: web
    name: qbridge-os
    runtime: python
    plan: free
    rootDir: .
    buildCommand: bash render-build.sh
    startCommand: HOST=0.0.0.0 python run_api.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: HOST
        value: "0.0.0.0"
      - key: QBRIDGE_SKIP_PQC_VERIFY
        value: "1"
      - key: QBRIDGE_HSTS
        value: "1"
      - key: QBRIDGE_CORS_ORIGINS
        value: "http://127.0.0.1:3000,http://localhost:3000,https://qbridge-os.vercel.app"
      - key: QBRIDGE_JWT_SECRET
        generateValue: true
      - key: QBRIDGE_MAX_REGS_PER_IP
        value: "3"
      - key: DATABASE_URL
        fromDatabase:
          name: qbridge-db
          property: connectionString
